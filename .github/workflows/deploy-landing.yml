name: Deploy landing page

on:
  push:
    branches:
      - main
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy landing to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Cloudflare direct deploy credentials
        id: cf-creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping direct Wrangler deploy because Cloudflare API secrets are not configured."
            echo "Cloudflare Pages Git integration remains the primary production deploy path."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy landing
        if: steps.cf-creds.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing --project-name=siklusio-landing --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
