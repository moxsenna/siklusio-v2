name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Backend to Cloudflare Workers
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2

      - name: Check backend changes
        id: check-changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger: always deploy."
          else
            # Check diff in the commit(s) of this run
            if git diff --name-only HEAD~1 HEAD | grep -E '^(backend/|wrangler.jsonc|\.github/workflows/deploy-backend.yml)'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Backend changes detected, deploying."
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No backend changes detected, skipping deploy."
            fi
          fi

      - name: Check Cloudflare direct deploy credentials
        id: cf-creds
        if: steps.check-changes.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping direct Wrangler deploy because Cloudflare API secrets are not configured."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend
        if: steps.check-changes.outputs.changed == 'true' && steps.cf-creds.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy backend/index.ts
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
